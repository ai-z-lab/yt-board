name: Fetch YouTube transcripts

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-transcripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch transcripts
        run: npm run fetch-transcripts

      - name: Commit updated videos
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update YouTube transcripts
          file_pattern: data/videos.json
