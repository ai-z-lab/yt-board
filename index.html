<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube動画仕分けボード</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <p class="eyebrow">YouTube Sorting Board</p>
      <h1>YouTube動画仕分けボード</h1>
      <p class="lead">気になるYouTube動画を、見る前に「要約」「視聴判断」「自分向け示唆」で整理する軽量Webアプリです。</p>
    </div>
  </header>

  <main class="container">
    <section class="action-panel" aria-labelledby="action-heading">
      <div>
        <p class="section-label">Local v2</p>
        <h2 id="action-heading">ブラウザに動画を追加</h2>
        <p>GitHub Pages上ではファイル保存できないため、追加データはこのブラウザのlocalStorageに保存します。</p>
      </div>
      <div class="action-buttons">
        <button type="button" id="toggleForm" class="primary-button">動画を追加</button>
        <button type="button" id="exportButton">追加データをエクスポート</button>
        <label class="import-button">
          JSONをインポート
          <input type="file" id="importInput" accept="application/json,.json">
        </label>
      </div>
      <p id="importStatus" class="status-message" aria-live="polite"></p>
    </section>

    <section id="addVideoPanel" class="add-video-panel" aria-labelledby="add-video-heading" hidden>
      <div>
        <p class="section-label">Add Video</p>
        <h2 id="add-video-heading">動画情報を入力</h2>
      </div>
      <form id="addVideoForm" class="video-form">
        <label>
          動画URL
          <input type="url" name="url" inputmode="url" placeholder="https://www.youtube.com/watch?v=..." required>
        </label>
        <div class="fetch-video-row">
          <button type="button" id="fetchVideoInfo" class="secondary-button">動画IDを取得</button>
          <p id="autoFillStatus" class="status-message compact" aria-live="polite"></p>
        </div>
        <div id="thumbnailPreview" class="thumbnail-preview full-field" hidden>
          <img alt="入力したYouTube動画のサムネイルプレビュー">
          <span class="thumbnail-caption">サムネイルを自動表示しています</span>
        </div>
        <label>
          チャンネル名
          <input type="text" name="channel" autocomplete="organization" required>
        </label>
        <label>
          動画タイトル
          <input type="text" name="title" required>
        </label>
        <label>
          整理テンプレート
          <select name="organizeTemplate">
            <option value="general" selected>汎用リサーチ</option>
            <option value="sns">SNS投稿ネタ化</option>
            <option value="youtube">YouTube企画化</option>
            <option value="note">note記事化</option>
            <option value="aiNews">AIニュース分析</option>
            <option value="manager">管理職・現場視点</option>
            <option value="fortiesReal">40代のリアル</option>
          </select>
        </label>
        <label class="full-field">
          気になった理由・メモ
          <textarea name="note" rows="3" placeholder="あとで見返したい理由、気になった切り口など" required></textarea>
        </label>
        <label class="full-field">
          文字起こし・本文
          <textarea name="transcript" rows="8" placeholder="YouTubeの文字起こし、字幕、本文メモなど（未入力でも保存できます）"></textarea>
        </label>
        <label class="full-field">
          取得方法メモ
          <input type="text" name="transcriptSourceNote" placeholder="例：YouTube文字起こしをコピー、手入力メモ、概要欄など">
        </label>
        <div class="full-field detail-toggle-row">
          <button type="button" id="toggleDetails" class="secondary-button" aria-expanded="false" aria-controls="detailFields">詳細を入力する</button>
          <span>要約や視聴判断は、あとから整理できます。</span>
        </div>
        <div id="detailFields" class="detail-fields full-field" hidden>
          <label>
            公開日
            <input type="date" name="publishedDate">
          </label>
          <label class="full-field">
            要約
            <textarea name="summary" rows="4" placeholder="未入力なら「未整理」で保存されます"></textarea>
          </label>
          <label class="full-field">
            重要ポイント（1行に1つ）
            <textarea name="points" rows="5" placeholder="未入力なら「未整理」で保存されます"></textarea>
          </label>
          <label class="full-field">
            自分向け示唆
            <textarea name="insight" rows="4" placeholder="未入力なら「未整理」で保存されます"></textarea>
          </label>
          <label>
            視聴判断
            <select name="watchDecision">
              <option value="D" selected>D 保留</option>
              <option value="A">A 全部見る</option>
              <option value="B">B 該当箇所だけ見る</option>
              <option value="C">C 要約で十分</option>
            </select>
          </label>
          <label>
            深掘り候補
            <select name="deepDive">
              <option value="undecided" selected>未判定</option>
              <option value="true">あり</option>
              <option value="false">なし</option>
            </select>
          </label>
          <label>
            投稿化候補
            <select name="contentUse">
              <option value="なし" selected>なし</option>
              <option value="X">X</option>
              <option value="note">note</option>
              <option value="YouTube">YouTube</option>
            </select>
          </label>
        </div>
        <div class="form-actions full-field">
          <button type="submit" class="primary-button">あとで整理する</button>
          <button type="reset">入力をクリア</button>
        </div>
        <p id="formStatus" class="status-message full-field" aria-live="polite"></p>
      </form>
    </section>

    <section class="controls" aria-labelledby="filter-heading">
      <div>
        <p class="section-label">Filter</p>
        <h2 id="filter-heading">仕分け条件</h2>
      </div>
      <div class="filter-grid">
        <label>
          視聴判断
          <select id="decisionFilter">
            <option value="all">すべて</option>
            <option value="A">A 全部見る</option>
            <option value="B">B 該当箇所だけ見る</option>
            <option value="C">C 要約で十分</option>
            <option value="D">D 保留</option>
          </select>
        </label>
        <label class="check-label">
          <input type="checkbox" id="deepDiveFilter">
          深掘り候補あり
        </label>
        <label class="check-label">
          <input type="checkbox" id="postCandidateFilter">
          投稿化候補あり
        </label>
      </div>
    </section>

    <section class="summary-bar" aria-live="polite">
      <span id="resultCount">0件</span>
      <button type="button" id="resetFilters">フィルターをリセット</button>
    </section>

    <section id="videoList" class="video-list" aria-label="動画一覧"></section>
    <p id="emptyState" class="empty-state" hidden>条件に一致する動画がありません。</p>
  </main>

  <template id="videoCardTemplate">
    <article class="video-card">
      <div class="card-topline">
        <span class="channel"></span>
        <span class="published-date"></span>
        <span class="source-badge badge"></span>
        <span class="organize-template template-badge"></span>
      </div>
      <button type="button" class="delete-video" hidden>削除</button>
      <a class="thumbnail-link" target="_blank" rel="noopener noreferrer" hidden>
        <img class="thumbnail" alt="">
      </a>
      <h3 class="title"></h3>
      <a class="url" target="_blank" rel="noopener noreferrer"></a>
      <p class="transcript-notice" hidden>本文なしのため、動画の中身を見た前提では要約できません。タイトル情報のみの仮判定として扱ってください。</p>
      <div class="card-actions">
        <button type="button" class="try-transcript-fetch secondary-button">文字起こし取得を試す</button>
        <button type="button" class="add-transcript secondary-button">文字起こしを追加</button>
        <button type="button" class="copy-prompt secondary-button">AI整理プロンプトをコピー</button>
        <button type="button" class="gemini-analyze primary-button">Geminiで解析する</button>
        <p class="transcript-trial-status status-message" aria-live="polite"></p>
      </div>
      <section class="transcript-panel" hidden aria-label="文字起こし取得サポート">
        <h4>文字起こし取得サポート</h4>
        <ol class="transcript-steps">
          <li>YouTubeで動画を開く</li>
          <li>メニューから「文字起こしを表示」を探す</li>
          <li>文字起こしをコピーする</li>
          <li>この欄に貼り付ける</li>
          <li>更新する</li>
          <li>AI整理プロンプトをコピーする</li>
        </ol>
        <form class="video-form edit-video-form">
          <label class="full-field">
            文字起こし・本文
            <textarea name="transcript" rows="8" placeholder="YouTubeの文字起こし、字幕、本文メモなどを貼り付け"></textarea>
          </label>
          <label class="full-field">
            取得方法メモ
            <input type="text" name="transcriptSourceNote" placeholder="例：YouTube文字起こしをコピー、概要欄を転記">
          </label>
          <div class="form-actions full-field">
            <button type="submit" class="primary-button transcript-save">更新する</button>
          </div>
        </form>
      </section>
      <div class="content-block note-block">
        <h4>気になった理由・メモ</h4>
        <p class="note"></p>
      </div>
      <dl class="meta-grid">
        <div>
          <dt>状態</dt>
          <dd class="organize-status badge"></dd>
        </div>
        <div>
          <dt>視聴判断</dt>
          <dd class="decision badge"></dd>
        </div>
        <div>
          <dt>深掘り候補</dt>
          <dd class="deep-dive badge"></dd>
        </div>
        <div>
          <dt>投稿化候補</dt>
          <dd class="post-candidate badge"></dd>
        </div>
        <div>
          <dt>文字起こし</dt>
          <dd class="transcript-status badge"></dd>
        </div>
        <div>
          <dt>テーマとの関係</dt>
          <dd class="theme-relation">テンプレート別に整理</dd>
        </div>
      </dl>
      <div class="content-block summary-preview-block">
        <h4>要約</h4>
        <p class="summary summary-preview"></p>
      </div>
      <button type="button" class="toggle-analysis primary-button" aria-expanded="false">詳細を見る</button>
      <section class="analysis-details" hidden aria-label="Gemini解析結果の詳細">
        <div class="content-block">
          <h4>要約全文</h4>
          <p class="summary-full detail-text"></p>
        </div>
        <div class="content-block">
          <h4>重要ポイント全文</h4>
          <ul class="points"></ul>
        </div>
        <div class="content-block insight-block">
          <h4>自分向け示唆全文</h4>
          <p class="insight detail-text"></p>
        </div>
        <div class="content-block">
          <h4>注意点</h4>
          <p class="risks detail-text"></p>
        </div>
        <div class="content-block">
          <h4>推奨アクション</h4>
          <p class="recommended-action detail-text"></p>
        </div>
        <div class="content-block transcript-detail-block">
          <button type="button" class="toggle-transcript-detail secondary-button" aria-expanded="false">文字起こしを表示</button>
          <div class="transcript-detail" hidden>
            <h4>文字起こし・本文</h4>
            <p class="transcript-source-note"></p>
            <pre class="transcript-full detail-text"></pre>
          </div>
        </div>
      </section>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
